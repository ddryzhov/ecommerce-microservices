databaseChangeLog:
  - changeSet:
      id: 01-create-inventory-items-table
      author: daniil
      changes:
        - createTable:
            tableName: inventory_items
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: sku_code
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: quantity
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - createCheckConstraint:
            constraintName: chk_quantity_non_negative
            tableName: inventory_items
            checkConstraint: "quantity >= 0"
      rollback:
        - dropTable:
            tableName: inventory_items
